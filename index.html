<!DOCTYPE html>
<head>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap');

body {
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:99px;
  background:tan;
}

h1 {
  opacity:0;
  color:#fff;
  font-family: "Quicksand", sans-serif;
  font-optical-sizing: auto;
  font-weight: 900;
  font-style: normal;
  font-size: 6rem;
  text-shadow: 2px 6px 0 purple, 4px 12px 0 orange, 6px 18px 0 yellow, 8px 24px 0 teal;  
}

@media screen and (max-width: 480px) {
  h1 {
    font-size: 20vw;
  }
}
	</style>
</head>

<body>
	<h1>Hellooo!!</h1>

	<script>
		const st = SplitText.create("h1", { type: "chars" });

gsap.timeline()
  .set("h1", { opacity: 1 })
  .set(st.chars, { yPercent: -60 })
  .to(st.chars, {
    duration: 1.4,
    ease: "power1.inOut",
    yPercent: 60,
    rotate: () => "random(-5,5)",
    stagger: {
      amount: 1.2,
      repeat: -1,
      repeatRefresh: true,
      yoyo: true
    },
    "text-shadow": "2px -6px 0 purple, 4px -12px 0 orange, 6px -18px 0 yellow, 8px -24px 0 teal"
  })
  .seek(99);
	</script>
</body>
</html>
